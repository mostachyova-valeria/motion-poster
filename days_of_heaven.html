<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Poster</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Черный фон, пока грузится видео */
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Видео заполнит весь экран без полей */
        }
    </style>
</head>
<body>

    <!-- 
        playsinline: важно для iOS, чтобы видео не открывалось в плеере во весь экран
        autoplay & muted: в браузерах автоплей работает ТОЛЬКО без звука
        loop: зацикливание
    -->
    <video autoplay muted loop playsinline id="myVideo">
        <source src="poster.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

</body>
</html>
